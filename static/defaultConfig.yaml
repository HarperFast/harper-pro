# HarperDB configuration file. Refer to https://harperdb.io/docs/reference/configuration-file/
---
http:
  compressionThreshold: 0
  cors: false
  corsAccessList:
    - null
  keepAliveTimeout: 30000
  port: null
  securePort: 9926
  mtls: false
  http2: false
  timeout: 120000
threads:
  count: null
  debug: false
authentication:
  authorizeLocal: false
  cacheTTL: 30000
  enableSessions: true
  operationTokenTimeout: 1d
  refreshTokenTimeout: 30d
analytics:
  aggregatePeriod: 60
  profiling: true
  replicate: false
applications:
  lockdown: freeze-after-load
  moduleLoader: vm-current-context
  dependencyLoader: auto
  allowedSpawnCommands:
    - npm
    - node
  allowedDirectory: app
componentsRoot: null
localStudio:
  enabled: true
logging:
  auditAuthEvents:
    logFailed: false
    logSuccessful: false
  auditLog: true
  auditRetention: 3d
  file: true
  level: warn
  root: null
  rotation:
    enabled: true
    compress: false
    interval: null
    maxSize: 64M
    path: null
  stdStreams: false
mqtt:
  network:
    port: 1883
    securePort: 8883
    mtls: false
  webSocket: true
  requireAuthentication: true
operationsApi:
  network:
    cors: true
    corsAccessList:
      - '*'
    domainSocket: hdb/operations-server
    port: null
    securePort: 9925
rootPath: null
replication:
  securePort: 9933
  databases: '*'
storage:
  writeAsync: false
  caching: true
  compression: true
  noReadAhead: false
  path: null
  prefetchWrites: true
tls:
  privateKey: null
node:
  hostname: null
license:
  region: null
# Empty (not omitted): the component loader only loads a root component whose config key is
# truthy (`for (const componentName in config) { if (!config[componentName]) continue; }` in
# componentLoader.ts), so an absent key means startOnMainThread never runs and secret custody
# silently never activates, even when a valid key was delivered via HARPER_SECRETS_KEY_FD/
# HARPER_SECRETS_PRIVATE_KEY_B64. Leave this key-less so provider selection stays automatic
# (see keyCustody.ts chooseProvider) -- do not add a `provider:` field here.
secretCustody: {}
