name: Smoke Tests

# Nightly canaries: deploy each customer-facing component onto an in-process Harper cluster built
# from this repo's dist/, seed data, and run a short low-load k6/JMeter check. Scheduled nightly to
# keep CI costs down; also runnable on demand. See smokeTests/README.md.

on:
  schedule:
    # Nightly at 06:00 UTC. Offset from Sync Core (07:00) so they don't contend.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      component:
        description: 'Which component(s) to smoke test'
        type: choice
        default: 'all'
        options:
          - all
          - risk-query
          - redirector
          - early-hints
          - acl-connect
      node-version:
        description: 'Node.js version'
        type: string
        default: '24'

permissions:
  contents: read

concurrency:
  group: smoke-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke ${{ matrix.component }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # On dispatch, honor the chosen component; on schedule, run them all.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == matrix.component
    strategy:
      fail-fast: false
      matrix:
        # Keep refs in sync with smokeTests/manifest.mjs.
        include:
          - component: risk-query
            repo: HarperFast/risk-query
            ref: main
            dir: risk-query
          - component: redirector
            repo: HarperFast/template-redirector
            ref: main
            dir: template-redirector
          - component: early-hints
            repo: HarperFast/template-early-hints
            ref: main
            dir: template-early-hints
          # acl-connect is deployed from the vendored fixture (no clone). repo/ref are informational.
          - component: acl-connect
            repo: HarperFast/acl-connect
            ref: main
            dir: acl-connect

    env:
      NODE_VERSION: ${{ github.event.inputs.node-version || '24' }}
      HARPER_INTEGRATION_TEST_LOG_DIR: /tmp/harper-smoke-test-logs

    steps:
      # App token so we can check out the (org-private) component repos.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.HARPERFAST_AI_CLIENT_ID }}
          private-key: ${{ secrets.HARPERFAST_AI_APP_PRIVATE_KEY }}

      - name: Checkout harper-pro
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      # acl-connect runs from the vendored fixture in smokeTests/fixtures/acl-connect/, skip the clone.
      - name: Checkout component (${{ matrix.repo }}@${{ matrix.ref }})
        if: matrix.component != 'acl-connect'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          token: ${{ steps.app-token.outputs.token }}
          path: smokeTests/.components/${{ matrix.dir }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build || true # known type errors are ignored here, same as integration-tests

      - name: Install k6
        if: matrix.component != 'acl-connect'
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install Java + JMeter + mqtt-xmeter plugin
        if: matrix.component == 'acl-connect'
        env:
          JMETER_VERSION: 5.6.3
          XMETER_VERSION: 2.0.2
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -fsSL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz" -o /tmp/jmeter.tgz
          sudo tar -xzf /tmp/jmeter.tgz -C /opt
          curl -fsSL "https://github.com/emqx/mqtt-jmeter/releases/download/${XMETER_VERSION}/mqtt-xmeter-${XMETER_VERSION}-jar-with-dependencies.jar" \
            -o "/opt/apache-jmeter-${JMETER_VERSION}/lib/ext/mqtt-xmeter.jar"
          echo "/opt/apache-jmeter-${JMETER_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Run smoke canary (${{ matrix.component }})
        run: node smokeTests/run-smoke.mjs --component=${{ matrix.component }}

      - name: Upload Harper server logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harper-smoke-logs-${{ matrix.component }}
          path: ${{ env.HARPER_INTEGRATION_TEST_LOG_DIR }}/
          retention-days: 5
          if-no-files-found: ignore
