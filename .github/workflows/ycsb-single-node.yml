name: YCSB Single-Node

# Single-node YCSB load test on ubuntu-latest (shared runner).
# Runs on every PR and on manual dispatch for branch-vs-main comparisons.
# auto-push is gated to main, so PR runs compare against the baseline without
# polluting the trend history. Absolute numbers vary on shared runners — treat
# them as a directional signal, not a hardware-representative benchmark.
# For a production-realistic comparison use the cluster YCSB (workflow_dispatch
# on ycsb-cluster-nightly.yml from the branch you want to compare).

on:
  pull_request:
    branches-ignore:
      - 'v5.0'
  workflow_dispatch:
    inputs:
      scale:
        description: 'Workload scale'
        required: true
        type: choice
        default: 'standard'
        options:
          - 'quick'
          - 'standard'
          - 'heavy'
      workloads:
        description: 'Comma-separated workloads (e.g. C,B,A,F,D,E)'
        required: false
        type: string
        default: 'C,B,A,F,D,E'

permissions:
  contents: write # github-action-benchmark pushes trend history to the gh-pages branch
  pull-requests: write # github-action-benchmark posts alert comments on PRs

jobs:
  ycsb-single-node:
    name: YCSB single-node (Node.js v24)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (with core submodule)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build || true # repo currently has type errors; ignore per integration-tests.yaml

      - name: Verify build output
        run: test -f dist/bin/harper.js || { echo "dist/bin/harper.js missing — build failed"; exit 1; }

      # The YCSB script lives in core and resolves the Harper binary relative to
      # itself at core/dist/bin/harper.js. harper-pro's build compiles core into
      # dist/core (its production runtime), so point core/dist at that built
      # output rather than rebuilding core standalone.
      - name: Expose core build output for benchmark
        run: |
          ln -sfn "$GITHUB_WORKSPACE/dist/core" core/dist
          test -f core/dist/bin/harper.js || { echo "core/dist/bin/harper.js missing — core build output not found"; exit 1; }

      # Discard any lockfile churn from npm install so the gh-pages checkout
      # that github-action-benchmark does below succeeds on a clean working tree.
      - name: Restore lockfile churn
        run: git checkout -- package-lock.json core/package-lock.json || true

      - name: Run YCSB load test
        # Pass inputs via env to prevent shell injection from free-form dispatch inputs.
        # Pull requests use 'quick' scale for faster CI feedback.
        env:
          SCALE: ${{ github.event_name == 'pull_request' && 'quick' || github.event.inputs.scale || 'standard' }}
          WORKLOADS: ${{ github.event.inputs.workloads || 'C,B,A,F,D,E' }}
        run: |
          node core/benchmarks/ycsb/run-single-node.mts --scale="$SCALE" --workloads="$WORKLOADS"

      - name: Convert results to benchmark format
        run: node core/benchmarks/ycsb/to-benchmark-json.mts core/benchmarks/ycsb/results/ycsb-single-node-latest.json core/benchmarks/ycsb/bench-out

      - name: Track throughput trend
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: YCSB Throughput (single-node)
          tool: customBiggerIsBetter
          output-file-path: core/benchmarks/ycsb/bench-out/throughput.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          fail-on-alert: false
          alert-threshold: '130%'
          alert-comment-cc-users: '@kriszyp'

      - name: Track latency (p99) trend
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: YCSB Latency p99 (single-node)
          tool: customSmallerIsBetter
          output-file-path: core/benchmarks/ycsb/bench-out/latency.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          fail-on-alert: false
          alert-threshold: '160%'
          alert-comment-cc-users: '@kriszyp'

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ycsb-single-node-results
          path: core/benchmarks/ycsb/results/*.json
          retention-days: 90
          if-no-files-found: warn
