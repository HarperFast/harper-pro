name: Sync Core

on:
  repository_dispatch:
    types: [ sync_core ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org'

      - name: Sync core
        run: npm run core:sync

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat: Sync Core'
          branch: sync-core-submodule
          title: 'chore: Sync Core'
          body: |
            Sync core submodule and update package.json dependencies.
            This PR was automatically created by the Sync Core workflow.
          labels: |
            automated pr
            core sync
