name: Report cherry-pick test results

# Listens for Integration Tests runs whose head_branch is a cherry-pick branch
# (cherry-pick/<release>/pr-<N>) and updates the sticky comment on the
# originating PR with the final status.

on:
  workflow_run:
    workflows: ['Integration Tests']
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      STICKY_MARKER: '<!-- patch-ci -->'
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
      CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}

    steps:
      - name: Debug event payload
        run: |
          echo "head_branch=$HEAD_BRANCH"
          echo "head_repository.full_name=$HEAD_REPO"
          echo "github.repository=${{ github.repository }}"
          echo "conclusion=$CONCLUSION"
          echo "run_url=$RUN_URL"

      # Reject runs originating from forks â€” head_branch is attacker-controlled
      # there and could be named to spoof a cherry-pick branch.
      - name: Gate on cherry-pick branch + same-repo
        id: gate
        run: |
          if [[ "$HEAD_BRANCH" == cherry-pick/* ]] && [[ "$HEAD_REPO" == "${{ github.repository }}" ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "Not a cherry-pick branch / not same repo, skipping."
          fi

      # Pin to `main` so the helper script is present. workflow_run already
      # defaults to the default branch, but pin for clarity.
      - if: steps.gate.outputs.match == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Update sticky comment
        if: steps.gate.outputs.match == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Branch format: cherry-pick/<release>/pr-<N>
          PR_NUMBER=$(echo "$HEAD_BRANCH" | sed -n 's|^cherry-pick/[^/]*/pr-\([0-9]\+\)$|\1|p')
          if [ -z "$PR_NUMBER" ]; then
            echo "Could not parse PR number from $HEAD_BRANCH"
            exit 0
          fi

          case "$CONCLUSION" in
            success) STATUS='âś… passed' ;;
            failure) STATUS='âťŚ failed' ;;
            cancelled) STATUS='âšŞ cancelled' ;;
            *) STATUS="âš ď¸Ź $CONCLUSION" ;;
          esac

          RELEASE_BRANCH=$(echo "$HEAD_BRANCH" | sed -n 's|^cherry-pick/\([^/]*\)/pr-[0-9]\+$|\1|p')

          BODY=$(printf '%s\n## Patch cherry-pick: tests %s\n\nIntegration tests on branch [`%s`](../tree/%s): **%s**\nRun: %s\n\nOn merge of this PR the cherry-pick branch will be fast-forwarded into `%s`.\n' \
            "$STICKY_MARKER" "$STATUS" "$HEAD_BRANCH" "$HEAD_BRANCH" "$STATUS" "$RUN_URL" "$RELEASE_BRANCH")
          node .github/scripts/upsert-sticky-comment.js "$PR_NUMBER" "$STICKY_MARKER" "$BODY"
