name: YCSB Cluster Nightly (self-hosted)

# Runs the 3-node cluster YCSB load test on a FIXED self-hosted runner (label
# `harper-bench`) so throughput/latency trends are comparable night to night —
# the shared GitHub runners are too small/variable for a 3 x (threads.count=4)
# cluster. Records trends + regression alerts via github-action-benchmark and
# uploads the raw JSON.
#
# Triggers are schedule + manual dispatch ONLY (never pull_request): the job
# executes on a self-hosted machine, so untrusted PR code must never run here.

on:
  schedule:
    - cron: '0 10 * * *' # ~03:00-04:00 America/Denver (UTC)
  workflow_dispatch:
    inputs:
      scale:
        description: 'Workload scale'
        required: true
        type: choice
        default: 'standard'
        options:
          - 'quick'
          - 'standard'
          - 'heavy'
      workloads:
        description: 'Comma-separated workloads (D excluded by default; see README)'
        required: false
        type: string
        default: 'C,B,A,F,E'

permissions:
  contents: write # github-action-benchmark pushes trend history to the gh-pages branch

# The `harper-bench` self-hosted box is shared with stress-large-data.yaml. GitHub
# concurrency groups are repo-scoped and matched by name across workflows, so using the
# same group name in both serializes them on that one box. cancel-in-progress: false so a
# queued run waits for the in-progress benchmark rather than killing it mid-measurement.
concurrency:
  group: harper-bench-exclusive
  cancel-in-progress: false

jobs:
  ycsb-cluster:
    name: YCSB 3-node cluster
    runs-on: [self-hosted, linux, harper-bench]
    timeout-minutes: 90

    steps:
      - name: Checkout (with core submodule)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build || true # repo currently has type errors; ignore per integration-tests.yaml

      - name: Verify build output
        run: test -f dist/bin/harper.js || { echo "dist/bin/harper.js missing — build failed"; exit 1; }

      # `npm install` above can rewrite package-lock.json (e.g. when it lags a version
      # bump in package.json), dirtying the working tree. The auto-push benchmark steps
      # below `git checkout gh-pages`, which aborts on a dirty tree. Discard the lockfile
      # churn so the checkout succeeds.
      - name: Restore lockfile churn
        run: git checkout -- package-lock.json

      - name: Run cluster YCSB load test
        # Inputs via env, not ${{ }} shell interpolation, to avoid script injection.
        env:
          SCALE: ${{ github.event.inputs.scale || 'standard' }}
          WORKLOADS: ${{ github.event.inputs.workloads || 'C,B,A,F,E' }}
        run: |
          node benchmarks/ycsb/run-cluster.mts --scale="$SCALE" --workloads="$WORKLOADS"

      - name: Convert results to benchmark format
        run: node core/benchmarks/ycsb/to-benchmark-json.mts core/benchmarks/ycsb/results/ycsb-cluster-latest.json core/benchmarks/ycsb/bench-out

      # A cancelled or early-dispatched run can leave a stale or partial `latest.json` on the
      # self-hosted runner; publishing it pollutes the trend with low partial points that look
      # like regressions. Only publish when the converted output carries the FULL expected metric
      # set: the `load` series plus one `workload <X>` series per requested workload. Series names
      # carry a description suffix (e.g. "workload A — Update heavy ..."), so this matches the
      # "workload <X>" prefix, not an exact name. Sets the `publish` output to gate the steps below.
      - name: Validate complete result set
        id: validate
        env:
          WORKLOADS: ${{ github.event.inputs.workloads || 'C,B,A,F,E' }}
        run: node benchmarks/ycsb/validate-benchmark-json.mts core/benchmarks/ycsb/bench-out/throughput.json "$WORKLOADS"

      - name: Track cluster throughput trend
        if: success() && steps.validate.outputs.publish == 'true'
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: YCSB Cluster Throughput
          tool: customBiggerIsBetter
          output-file-path: core/benchmarks/ycsb/bench-out/throughput.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          fail-on-alert: false
          alert-threshold: '130%'
          alert-comment-cc-users: '@kriszyp'

      - name: Track cluster latency (p99) trend
        if: success() && steps.validate.outputs.publish == 'true'
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: YCSB Cluster Latency p99
          tool: customSmallerIsBetter
          output-file-path: core/benchmarks/ycsb/bench-out/latency.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # The throughput step already fetched gh-pages this job; reuse that checkout so this
          # second step doesn't re-fetch (which would conflict with the first step's local commit
          # when auto-push is off). On main, each step pushes before the next, so this is safe too.
          skip-fetch-gh-pages: true
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          fail-on-alert: false
          alert-threshold: '160%'
          alert-comment-cc-users: '@kriszyp'

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ycsb-cluster-results
          path: core/benchmarks/ycsb/results/*.json
          retention-days: 90
          if-no-files-found: warn
