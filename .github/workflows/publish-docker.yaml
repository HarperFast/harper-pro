name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build and push'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - standard
          - gpu
          - openshift

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'standard'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 25]
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: harperfast/harper-pro
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            NODE_BUILD_VERSION=${{ matrix.node-version }}
            NODE_VERSION=${{ matrix.node-version }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digest-node${{ matrix.node-version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'standard'
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        node-version: [24, 25]
    outputs:
      docker-image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: Dockerfile
          sparse-checkout-cone-mode: false
      - name: Get default Node version
        id: default
        run: echo "node-version=$(sed -n 's/^ARG NODE_VERSION=//p' Dockerfile)" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-node${{ matrix.node-version }}-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: harperfast/harper-pro
          tags: |
            type=semver,pattern={{version}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}},suffix=-node${{ matrix.node-version }}
            type=sha,suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{version}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=sha,enable=${{ matrix.node-version == steps.default.outputs.node-version }}
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro:${{ steps.meta.outputs.version }}

  build-gpu:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'gpu'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 25]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: harperfast/harper-pro-gpu
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile-gpu
          platforms: linux/amd64
          build-args: |
            NODE_BUILD_VERSION=${{ matrix.node-version }}
            NODE_VERSION=${{ matrix.node-version }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro-gpu,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-gpu-node${{ matrix.node-version }}-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-gpu:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'gpu'
    runs-on: ubuntu-latest
    needs: [build-gpu]
    strategy:
      matrix:
        node-version: [24, 25]
    outputs:
      docker-image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: Dockerfile-gpu
          sparse-checkout-cone-mode: false
      - name: Get default Node version
        id: default
        run: echo "node-version=$(sed -n 's/^ARG NODE_VERSION=//p' Dockerfile-gpu | head -1)" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-gpu-node${{ matrix.node-version }}-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: harperfast/harper-pro-gpu
          tags: |
            type=semver,pattern={{version}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}},suffix=-node${{ matrix.node-version }}
            type=sha,suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{version}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=sha,enable=${{ matrix.node-version == steps.default.outputs.node-version }}
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro-gpu@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro-gpu:${{ steps.meta.outputs.version }}

  build-openshift:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'openshift'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'
      - name: Get package version
        id: version
        run: echo "version=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: harperfast/harper-pro-openshift
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile-openshift
          platforms: ${{ matrix.platform }}
          build-args: |
            HARPER_VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro-openshift,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-openshift-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-openshift:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'openshift'
    runs-on: ubuntu-latest
    needs: [build-openshift]
    outputs:
      docker-image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-openshift-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: harperfast/harper-pro-openshift
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro-openshift@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro-openshift:${{ steps.meta.outputs.version }}

  # Submit the published image to Red Hat Connect for OpenShift certification.
  # Gated on the REDHAT_CERTIFY_ENABLED repo variable so the workflow stays green
  # until the Red Hat Connect project + secrets below are provisioned. To enable:
  #   1. Create a "Container image" certification project at connect.redhat.com
  #      for harper-pro-openshift and copy its certification component ID into the
  #      REDHAT_CERTIFICATION_COMPONENT_ID repo variable.
  #   2. Add secrets:
  #        REDHAT_PYXIS_KEY                 - Pyxis API token for that project
  #        REDHAT_CONNECT_DOCKERCONFIG_JSON - docker auth json so Red Hat can pull
  #             from Docker Hub (generate with: docker/podman login registry.hub.docker.com
  #             --authfile ./auth.json, then paste the file contents).
  #   3. Set the REDHAT_CERTIFY_ENABLED repo variable to 'true'.
  certify-openshift:
    if: >-
      vars.REDHAT_CERTIFY_ENABLED == 'true' &&
      (github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'openshift')
    runs-on: ubuntu-latest
    needs: [merge-openshift]
    timeout-minutes: 20
    steps:
      - name: Install OpenShift preflight
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # v1.13.1
        with:
          source: 'github'
          preflight: 'latest'
      - name: Submit image to Red Hat Connect
        env:
          REDHAT_DOCKERCONFIG: ${{ secrets.REDHAT_CONNECT_DOCKERCONFIG_JSON }}
          PYXIS_API_TOKEN: ${{ secrets.REDHAT_PYXIS_KEY }}
          CERTIFICATION_COMPONENT_ID: ${{ vars.REDHAT_CERTIFICATION_COMPONENT_ID }}
          container_registry: 'registry.hub.docker.com'
          container_image: 'harperfast/harper-pro-openshift'
          container_tag: ${{ needs.merge-openshift.outputs.docker-image-tag }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "writing docker-config.json for submission"
          echo "${REDHAT_DOCKERCONFIG}" | jq '.' > docker-config.json

          echo "preflighting ${container_image}:${container_tag} (component ${CERTIFICATION_COMPONENT_ID})"
          preflight check container "${container_registry}/${container_image}:${container_tag}" \
            --pyxis-api-token="${PYXIS_API_TOKEN}" \
            --certification-component-id="${CERTIFICATION_COMPONENT_ID}" \
            --docker-config ./docker-config.json \
            --submit >> "${GITHUB_STEP_SUMMARY}"

  send-slack-message-on-success:
    if: success() && !cancelled()
    needs: [merge]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack published notification
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} has been published to Docker Hub",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":white_check_mark: Published to :docker_logo:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<https://hub.docker.com/layers/harperfast/harper-pro/${{ needs.merge.outputs.docker-image-tag }}|harperfast/harper-pro:${{ needs.merge.outputs.docker-image-tag }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-on-failure:
    if: failure() && !cancelled()
    needs: [merge]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} Docker publish failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":x: Failed to publish to :docker_logo:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run ${{ github.run_id }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-gpu-on-success:
    if: success() && !cancelled()
    needs: [merge-gpu]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack GPU published notification
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro GPU v${{ needs.merge-gpu.outputs.docker-image-tag }} has been published to Docker Hub",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro GPU v${{ needs.merge-gpu.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":white_check_mark: Published to :docker_logo:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<https://hub.docker.com/layers/harperfast/harper-pro-gpu/${{ needs.merge-gpu.outputs.docker-image-tag }}|harperfast/harper-pro-gpu:${{ needs.merge-gpu.outputs.docker-image-tag }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-gpu-on-failure:
    if: failure() && !cancelled()
    needs: [merge-gpu]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro GPU v${{ needs.merge-gpu.outputs.docker-image-tag }} Docker publish failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro GPU v${{ needs.merge-gpu.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":x: Failed to publish to :docker_logo:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run ${{ github.run_id }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-openshift-on-success:
    if: success() && !cancelled()
    needs: [merge-openshift]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack OpenShift published notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro OpenShift v${{ needs.merge-openshift.outputs.docker-image-tag }} has been published to Docker Hub",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro OpenShift v${{ needs.merge-openshift.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":white_check_mark: Published to :docker_logo: (Red Hat certification submitted if enabled)"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<https://hub.docker.com/layers/harperfast/harper-pro-openshift/${{ needs.merge-openshift.outputs.docker-image-tag }}|harperfast/harper-pro-openshift:${{ needs.merge-openshift.outputs.docker-image-tag }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-openshift-on-failure:
    if: failure() && !cancelled()
    needs: [merge-openshift]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro OpenShift v${{ needs.merge-openshift.outputs.docker-image-tag }} Docker publish failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro OpenShift v${{ needs.merge-openshift.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":x: Failed to publish to :docker_logo:"
                    },
