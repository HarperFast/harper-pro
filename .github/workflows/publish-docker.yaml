name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build and push'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - standard
          - gpu
          - openshift

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'standard'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # The pc (V8 pointer compression, harper#919) variant builds in its own
        # build-pc job so its dispatch-only base image can never block this
        # standard release image (see build-pc / the PUBLISH_PC_VARIANT gate).
        include:
          - { node-version: 24, platform: linux/amd64, runner: ubuntu-latest, variant: standard }
          - { node-version: 24, platform: linux/arm64, runner: ubuntu-24.04-arm, variant: standard }
          - { node-version: 25, platform: linux/amd64, runner: ubuntu-latest, variant: standard }
          - { node-version: 25, platform: linux/arm64, runner: ubuntu-24.04-arm, variant: standard }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # -trixie: the runtime requires Debian trixie's glibc (see Dockerfile);
          # matrix.node-version stays the bare major for tag naming.
          build-args: |
            NODE_BUILD_VERSION=${{ matrix.node-version }}-trixie
            NODE_VERSION=${{ matrix.node-version }}-trixie
            ${{ matrix.variant == 'pc' && format('RUN_IMAGE=harperfast/node-pointer-compression:{0}', matrix.node-version) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.variant == 'pc' && 'pc-' || '' }}node${{ matrix.node-version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'standard'
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        node-version: [24, 25]
    outputs:
      docker-image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: Dockerfile
          sparse-checkout-cone-mode: false
      - name: Get default Node version
        id: default
        # cut: the Dockerfile default is a full image tag (e.g. 24-trixie); tags compare on the bare major
        run: echo "node-version=$(sed -n 's/^ARG NODE_VERSION=//p' Dockerfile | cut -d- -f1)" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-node${{ matrix.node-version }}-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro
          tags: |
            type=semver,pattern={{version}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}},suffix=-node${{ matrix.node-version }}
            type=sha,suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{version}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=sha,enable=${{ matrix.node-version == steps.default.outputs.node-version }}
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro:${{ steps.meta.outputs.version }}

  # V8 pointer-compression variant (harper#919), isolated from the standard build
  # so it can never block the standard release image. The pc legs build FROM
  # harperfast/node-pointer-compression:<major>, published by the dispatch-only
  # publish-node-pc-image workflow (compiling Node from source takes 1-2+ h/arch).
  # Gated on the PUBLISH_PC_VARIANT repo variable: set it to 'true' once that base
  # image exists for the current Node version; leave it unset to skip pc entirely.
  build-pc:
    if: >-
      vars.PUBLISH_PC_VARIANT == 'true' &&
      (github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'standard')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # pc only builds for the default Node version (the base image is expensive
        # to compile); both arches.
        include:
          - { node-version: 24, platform: linux/amd64, runner: ubuntu-latest }
          - { node-version: 24, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # -trixie: the runtime requires Debian trixie's glibc (see Dockerfile);
          # matrix.node-version stays the bare major for tag naming and the base image.
          build-args: |
            NODE_BUILD_VERSION=${{ matrix.node-version }}-trixie
            NODE_VERSION=${{ matrix.node-version }}-trixie
            RUN_IMAGE=harperfast/node-pointer-compression:${{ matrix.node-version }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-pc-node${{ matrix.node-version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-pc:
    if: >-
      vars.PUBLISH_PC_VARIANT == 'true' &&
      (github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'standard')
    runs-on: ubuntu-latest
    needs: [build-pc]
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-pc-node24-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro
          flavor: |
            suffix=-pc,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro@sha256:%s ' *)
      - name: Verify pointer compression and rebuilt uWS
        run: |
          docker run --rm --entrypoint node harperfast/harper-pro:${{ steps.meta.outputs.version }} -e '
            if (process.config.variables.v8_enable_pointer_compression !== 1) {
              console.error("pointer compression NOT enabled"); process.exit(1);
            }
            const uws = "/home/harperdb/.npm-global/lib/node_modules/@harperfast/harper-pro/node_modules/uWebSockets.js";
            if (!require("fs").existsSync(uws + "/.pointer-compression-build")) {
              console.error("uWS pointer-compression marker missing"); process.exit(1);
            }
            const app = require(uws).App();
            console.log("pointer compression enabled, heap limit:",
              require("v8").getHeapStatistics().heap_size_limit / 1048576, "MB; rebuilt uWS loads and constructs");
          '
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro:${{ steps.meta.outputs.version }}

  build-gpu:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'gpu'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 25]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro-gpu
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile-gpu
          platforms: linux/amd64
          build-args: |
            NODE_BUILD_VERSION=${{ matrix.node-version }}
            NODE_VERSION=${{ matrix.node-version }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro-gpu,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-gpu-node${{ matrix.node-version }}-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-gpu:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'gpu'
    runs-on: ubuntu-latest
    needs: [build-gpu]
    strategy:
      matrix:
        node-version: [24, 25]
    outputs:
      docker-image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: Dockerfile-gpu
          sparse-checkout-cone-mode: false
      - name: Get default Node version
        id: default
        run: echo "node-version=$(sed -n 's/^ARG NODE_VERSION=//p' Dockerfile-gpu | head -1)" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-gpu-node${{ matrix.node-version }}-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro-gpu
          tags: |
            type=semver,pattern={{version}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{major}},suffix=-node${{ matrix.node-version }}
            type=sha,suffix=-node${{ matrix.node-version }}
            type=semver,pattern={{version}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=semver,pattern={{major}},enable=${{ matrix.node-version == steps.default.outputs.node-version }}
            type=sha,enable=${{ matrix.node-version == steps.default.outputs.node-version }}
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro-gpu@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro-gpu:${{ steps.meta.outputs.version }}

  build-openshift:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'openshift'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Get package version
        id: version
        run: echo "version=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro-openshift
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile-openshift
          platforms: ${{ matrix.platform }}
          build-args: |
            HARPER_VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=harperfast/harper-pro-openshift,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-openshift-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-openshift:
    if: github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'openshift'
    runs-on: ubuntu-latest
    needs: [build-openshift]
    outputs:
      docker-image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-openshift-*
          merge-multiple: true
      - name: Setup Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: harperfast/harper-pro-openshift
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'harperfast/harper-pro-openshift@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect harperfast/harper-pro-openshift:${{ steps.meta.outputs.version }}

  # Submit the published image to Red Hat Connect for OpenShift certification.
  # Gated on the REDHAT_CERTIFY_ENABLED repo variable so the workflow stays green
  # until the Red Hat Connect component is provisioned. To enable:
  #   1. Create the container image component at connect.redhat.com and copy its
  #      certification component ID (the {component-id} segment of
  #      connect.redhat.com/component/{listing-id}/{component-id}/images/...) into
  #      the REDHAT_CERTIFICATION_COMPONENT_ID repo variable.
  #   2. Add the REDHAT_PYXIS_KEY secret (org-scoped Pyxis API token).
  #   3. Set the REDHAT_CERTIFY_ENABLED repo variable to 'true'.
  # The Docker Hub pull auth preflight uses is built from the existing
  # DOCKERHUB_USERNAME / DOCKERHUB_TOKEN creds (the image is public, but
  # authenticating avoids Docker Hub anonymous-pull rate limits), so no separate
  # registry-auth secret is required.
  certify-openshift:
    if: >-
      vars.REDHAT_CERTIFY_ENABLED == 'true' &&
      (github.event_name == 'release' || inputs.image == 'all' || inputs.image == 'openshift')
    runs-on: ubuntu-latest
    needs: [merge-openshift]
    timeout-minutes: 20
    steps:
      # Install preflight directly (not via redhat-actions/openshift-tools-installer,
      # which still runs on the deprecated Node 20) with a pinned version and a
      # verified checksum, so this secret-bearing certification path is deterministic.
      # Runner is amd64 (ubuntu-latest); update PREFLIGHT_SHA256 if bumping the version.
      - name: Install OpenShift preflight (pinned + checksum-verified)
        env:
          PREFLIGHT_VERSION: '1.19.0'
          PREFLIGHT_SHA256: '1d7a845c4528f9476c8ef9a551b4da5c06d62de558e56a37054c6fa737d583e5'
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          curl -fsSL -o preflight \
            "https://github.com/redhat-openshift-ecosystem/openshift-preflight/releases/download/${PREFLIGHT_VERSION}/preflight-linux-amd64"
          echo "${PREFLIGHT_SHA256}  preflight" | sha256sum -c -
          chmod +x preflight
          sudo mv preflight /usr/local/bin/preflight
          preflight version
      - name: Submit image to Red Hat Connect
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PYXIS_API_TOKEN: ${{ secrets.REDHAT_PYXIS_KEY }}
          CERTIFICATION_COMPONENT_ID: ${{ vars.REDHAT_CERTIFICATION_COMPONENT_ID }}
          container_registry: 'registry.hub.docker.com'
          container_image: 'harperfast/harper-pro-openshift'
          container_tag: ${{ needs.merge-openshift.outputs.docker-image-tag }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          # Build a docker config.json for preflight's pull, from existing Docker Hub
          # creds. Authenticating (vs anonymous) avoids Docker Hub pull rate limits.
          auth=$(printf '%s:%s' "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 -w0)
          cat > docker-config.json <<EOF
          {"auths":{"https://index.docker.io/v1/":{"auth":"${auth}"},"registry.hub.docker.com":{"auth":"${auth}"}}}
          EOF

          echo "preflighting ${container_image}:${container_tag} (component ${CERTIFICATION_COMPONENT_ID})"
          preflight check container "${container_registry}/${container_image}:${container_tag}" \
            --pyxis-api-token="${PYXIS_API_TOKEN}" \
            --certification-component-id="${CERTIFICATION_COMPONENT_ID}" \
            --docker-config ./docker-config.json \
            --submit >> "${GITHUB_STEP_SUMMARY}"

  send-slack-message-on-success:
    # Standard image is the release gate; pc is opt-in. Fire only when the standard
    # image published (merge succeeded, which implies build did) and the pc legs did
    # not fail. A pc failure surfaces at build-pc (which skips merge-pc), so check
    # build-pc too — skipped (pc off) is fine, only failure suppresses success.
    if: ${{ !cancelled() && needs.merge.result == 'success' && needs.build-pc.result != 'failure' && needs.merge-pc.result != 'failure' }}
    needs: [merge, build-pc, merge-pc]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack published notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} has been published to Docker Hub",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":white_check_mark: Published to :docker_logo:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<https://hub.docker.com/layers/harperfast/harper-pro/${{ needs.merge.outputs.docker-image-tag }}|harperfast/harper-pro:${{ needs.merge.outputs.docker-image-tag }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-on-failure:
    # Alert if any standard or pc leg that ran failed. A failed build skips its merge
    # (result 'skipped', not 'failure'), so check the build jobs too or a build-stage
    # failure would be swallowed. pc failure no longer blocks the standard image, but
    # we still surface it.
    if: ${{ !cancelled() && (needs.build.result == 'failure' || needs.merge.result == 'failure' || needs.build-pc.result == 'failure' || needs.merge-pc.result == 'failure') }}
    needs: [build, merge, build-pc, merge-pc]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "#development-ci",
              "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} Docker publish failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Harper Pro v${{ needs.merge.outputs.docker-image-tag }} release"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":x: Failed to publish to :docker_logo:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run ${{ github.run_id }}>"
                    }
                  ]
                }
              ]
            }

  send-slack-message-gpu-on-success:
    if: success() && !cancelled()
    needs: [merge-gpu]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack GPU published notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
