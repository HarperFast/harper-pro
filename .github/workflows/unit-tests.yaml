name: Unit Tests

on:
  push:
    branches: [main, 'v[0-9]+.[0-9]+']
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (Node.js v${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --ignore-scripts

      # re2 downloads its native binary from a post-install script (unlike lmdb/msgpackr/rocksdb,
      # which bundle prebuilds), so --ignore-scripts above leaves it absent. Materialize it here.
      - name: Build re2 native binary
        run: npm rebuild re2

      - name: Build
        run: npm run build || true

      - name: Run unit tests
        run: npm run test:unit
