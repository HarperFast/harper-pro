name: Publish Node Pointer-Compression Base Image

# Builds Node.js from source with V8 pointer compression enabled (plus a
# uWebSockets.js addon rebuilt against that ABI) and publishes it as
# harperfast/node-pointer-compression:<major> (plus the exact version tag).
# The main Docker publish workflow layers Harper Pro on top of it via the
# RUN_IMAGE build arg. Compiling Node takes 1-2+ hours per arch on hosted
# runners, so this is dispatch-only — re-run it when the Node version, the
# uWebSockets.js pin, or the @datadog/pprof version bumps; regular releases just
# pull the published base. The check-node-pc-image-drift workflow dispatches
# this automatically (daily) when any of those inputs drift from the repo pins
# or a new patch of the pinned Node major is released.

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node major version (tag of docker.io/node to mirror)'
        required: true
        default: '24'
      uws-source-commit:
        description: 'uWebSockets.js source commit (the source_commit file inside the binaries tarball pinned in package.json)'
        required: true
        default: 'fbdac03ee398031f304ddeb6764358d2eaa6fe29'
      pprof-version:
        description: '@datadog/pprof version (keep in sync with package-lock.json)'
        required: true
        default: '5.15.1'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.node-version }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: build-tools/node-pointer-compression.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            NODE_VERSION=${{ inputs.node-version }}
            UWS_SOURCE_COMMIT=${{ inputs.uws-source-commit }}
            PPROF_VERSION=${{ inputs.pprof-version }}
          # Record the build inputs so a human (or the drift check) can see what a
          # published image was built from. The exact Node version is also carried
          # by the :<exact> tag created in the merge job.
          labels: |
            org.harperfast.pc.node-version=${{ inputs.node-version }}
            org.harperfast.pc.uws-source-commit=${{ inputs.uws-source-commit }}
            org.harperfast.pc.pprof-version=${{ inputs.pprof-version }}
          outputs: type=image,name=harperfast/node-pointer-compression,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: build-tools/pc-image-signature.sh
          sparse-checkout-cone-mode: false
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t harperfast/node-pointer-compression:${{ inputs.node-version }} \
            $(printf 'harperfast/node-pointer-compression@sha256:%s ' *)
      - name: Tag exact Node version, content signature, and inspect
        run: |
          docker pull harperfast/node-pointer-compression:${{ inputs.node-version }}
          exact=$(docker run --rm harperfast/node-pointer-compression:${{ inputs.node-version }} -p 'process.version.slice(1)')
          # sig-<hash> records the full build-input set (exact Node + uWS + pprof) as
          # a tag the daily drift check probes for; missing tag => an input changed.
          sig=$(build-tools/pc-image-signature.sh "$exact" "${{ inputs.uws-source-commit }}" "${{ inputs.pprof-version }}")
          docker buildx imagetools create \
            -t harperfast/node-pointer-compression:$exact \
            -t harperfast/node-pointer-compression:sig-$sig \
            harperfast/node-pointer-compression:${{ inputs.node-version }}
          docker buildx imagetools inspect harperfast/node-pointer-compression:${{ inputs.node-version }}
