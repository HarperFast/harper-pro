name: Integration Tests

on:
  push:
    branches: [main, 'v[0-9]+.[0-9]+']
  pull_request:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node.js version'
        required: true
        type: choice
        default: 'all'
        options:
          - 'all'
          - '22'
          - '24'
          - '26'

jobs:
  generate-node-version-matrix:
    name: Generate Node Version Matrix
    runs-on: ubuntu-latest
    outputs:
      node-versions: ${{ steps.set-node-versions.outputs.node-versions }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: Set Node versions
        id: set-node-versions
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR pushes run a single representative Node version to keep the dev loop fast;
            # the full 22/24/26 matrix runs on push to main/release and on the nightly schedule.
            echo "node-versions=[24]" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.node-version }}" == "all" ] || [ -z "${{ github.event.inputs.node-version }}" ]; then
            echo "node-versions=[22, 24, 26]" >> $GITHUB_OUTPUT
          else
            echo "node-versions=[${{ github.event.inputs.node-version }}]" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Harper Pro (Node.js v${{ matrix.node-version }})
    needs: generate-node-version-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.generate-node-version-matrix.outputs.node-versions) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build || true # we currently have type errors so just ignore that

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harper-build-artifacts-node-${{ matrix.node-version }}
          path: |
            dist/
            static/
            node_modules/
            package.json
          retention-days: 1

  run-integration-tests:
    name: Integration Tests ${{matrix.shard}}/3 (Node.js v${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [generate-node-version-matrix, build]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.generate-node-version-matrix.outputs.node-versions) }}
        # Non-cluster is the light tier (~16 single-process files); the heavy cluster
        # tier (~40 multi-process files) runs in its own job below with more shards.
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: harper-build-artifacts-node-${{ matrix.node-version }}

      - name: Relink bin scripts
        run: npm install --ignore-scripts

      # re2 downloads its native binary from a post-install script (unlike lmdb/msgpackr/rocksdb,
      # which bundle prebuilds), so --ignore-scripts above leaves it absent. Materialize it here.
      - name: Build re2 native binary
        run: npm rebuild re2

      - name: Install harperdb@4 for legacy tests
        run: |
          mkdir -p /tmp/harperdb-legacy
          npm install --ignore-scripts --prefix /tmp/harperdb-legacy harperdb@4

      - name: Run Integration Test Shard ${{ matrix.shard }}
        env:
          HARPER_INTEGRATION_TEST_LOG_DIR: /tmp/harper-integration-test-logs
          HARPER_LEGACY_VERSION_PATH: /tmp/harperdb-legacy/node_modules/harperdb
          # Cap concurrent test files at 2: several multi-node replication suites
          # run heavy clusters, and the default (availableParallelism/2+1) let too
          # many run at once on CI runners, starving each other into shard timeouts.
          HARPER_INTEGRATION_TEST_CONCURRENCY: '2'
        run: |
          npm run test:integration:non-cluster -- --shard=${{ matrix.shard }}/3

      - name: Upload Harper server logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harper-server-logs-node-${{ matrix.node-version }}-shard-${{ matrix.shard }}
          path: /tmp/harper-integration-test-logs/
          retention-days: 3
          if-no-files-found: ignore

  run-cluster-tests:
    name: Cluster Integration Tests ${{matrix.shard}}/6 (Node.js v${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [generate-node-version-matrix, build]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.generate-node-version-matrix.outputs.node-versions) }}
        # Heavy tier: ~40 files each booting 2–4 Harper processes — more shards than
        # the non-cluster job to keep per-shard wall-clock and timeout headroom sane.
        shard: [1, 2, 3, 4, 5, 6]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: harper-build-artifacts-node-${{ matrix.node-version }}

      - name: Relink bin scripts
        run: npm install --ignore-scripts

      # re2 downloads its native binary from a post-install script (unlike lmdb/msgpackr/rocksdb,
      # which bundle prebuilds), so --ignore-scripts above leaves it absent. Materialize it here.
      - name: Build re2 native binary
        run: npm rebuild re2

      - name: Install harperdb@4 for legacy tests
        run: |
          mkdir -p /tmp/harperdb-legacy
          npm install --ignore-scripts --prefix /tmp/harperdb-legacy harperdb@4

      - name: Run Cluster Integration Test Shard ${{ matrix.shard }}
        env:
          HARPER_INTEGRATION_TEST_LOG_DIR: /tmp/harper-integration-test-logs
          HARPER_LEGACY_VERSION_PATH: /tmp/harperdb-legacy/node_modules/harperdb
          # Cap concurrent test files at 2: several multi-node replication suites
          # run heavy clusters, and the default (availableParallelism/2+1) let too
          # many run at once on CI runners, starving each other into shard timeouts.
          HARPER_INTEGRATION_TEST_CONCURRENCY: '2'
        run: |
          npm run test:integration:cluster -- --shard=${{ matrix.shard }}/6

      - name: Upload Harper server logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harper-cluster-server-logs-node-${{ matrix.node-version }}-shard-${{ matrix.shard }}
          path: /tmp/harper-integration-test-logs/
          retention-days: 3
          if-no-files-found: ignore
